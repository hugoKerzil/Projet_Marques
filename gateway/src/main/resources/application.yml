server:
  port: 8080

spring:
  cloud:
    gateway:
      cors-configurations:
        '[/**]':
          allowedOrigins: "http://localhost:5173"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
          allowedHeaders: "*"
      routes:
        - id: movie-route
          uri: http://localhost:8081
          predicates:
            - Path=/movies/**